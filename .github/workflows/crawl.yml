name: 每日自动爬虫

# 触发条件
on:
  schedule:
    # 定时运行：cron表达式使用UTC时间。北京时间=UTC+8
    # 下面表示每天UTC时间2:00运行，即北京时间10:00
    - cron: '0 2 * * *'
  # 允许手动触发（方便测试）
  workflow_dispatch:

permissions:
  contents: write  # 允许向仓库提交代码

jobs:
  run-crawlers:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'  # 根据您的爬虫需求选择版本

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行主控脚本
        run: python run_all.py   # 如果没写主控脚本，可以分别运行多个脚本

      - name: 提交生成的数据文件回仓库
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: '自动更新数据文件'
          file_pattern: 'data/*.xlsx'  # 假设您的爬虫生成了JSON文件，或者需要提交Excel？根据需要修改
          # 如果生成的是Excel，改为 'data/*.xlsx'；如果多个格式，可以用空格分隔
